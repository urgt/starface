name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && 'Deploy to Production' || 'Build check' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare env types
        run: pnpm --filter @starface/web cf-typegen

      - name: Typecheck web
        run: pnpm --filter @starface/web typecheck

      - name: Typecheck scripts
        run: pnpm --filter @starface/scripts typecheck

      - name: Python syntax check (modal_app + seed)
        run: |
          python -m py_compile modal_app/*.py
          python -m py_compile scripts/seed/py/*.py

      - name: Build
        run: pnpm --filter @starface/web exec opennextjs-cloudflare build

      - name: Apply D1 migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm --filter @starface/web exec wrangler d1 migrations apply starface --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm --filter @starface/web exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/web
