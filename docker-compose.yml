services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starface}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starface}
      POSTGRES_DB: ${POSTGRES_DB:-starface}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-starface} -d ${POSTGRES_DB:-starface}"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-starface}
    entrypoint: ["sh", "-c"]
    command:
      - |
        psql -h postgres -U ${POSTGRES_USER:-starface} -d ${POSTGRES_DB:-starface} -v ON_ERROR_STOP=1 -f /migrations/migrate-and-seed.sql
    volumes:
      - ./docker:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  ml:
    build:
      context: ./apps/ml
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-starface}:${POSTGRES_PASSWORD:-starface}@postgres:5432/${POSTGRES_DB:-starface}
      DATA_DIR: /data
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/ml/app:/app/app
      - ./data:/data
      - ml-models:/root/.insightface
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ml/health', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 600s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-starface}:${POSTGRES_PASSWORD:-starface}@postgres:5432/${POSTGRES_DB:-starface}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8000
      DATA_DIR: /data
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      MATCH_MIN_COSINE: ${MATCH_MIN_COSINE:-0.2}
      DISPLAY_MIN_PCT: ${DISPLAY_MIN_PCT:-60}
      DISPLAY_MAX_PCT: ${DISPLAY_MAX_PCT:-97}
      USER_PHOTO_TTL_HOURS: ${USER_PHOTO_TTL_HOURS:-24}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/web/app:/workspace/apps/web/app
      - ./apps/web/components:/workspace/apps/web/components
      - ./apps/web/lib:/workspace/apps/web/lib
      - ./apps/web/public:/workspace/apps/web/public
      - ./apps/web/drizzle:/workspace/apps/web/drizzle
      - ./apps/web/middleware.ts:/workspace/apps/web/middleware.ts
      - ./apps/web/next.config.mjs:/workspace/apps/web/next.config.mjs
      - ./apps/web/tailwind.config.ts:/workspace/apps/web/tailwind.config.ts
      - ./apps/web/postcss.config.mjs:/workspace/apps/web/postcss.config.mjs
      - ./apps/web/tsconfig.json:/workspace/apps/web/tsconfig.json
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  ml-models:
